<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>I2I Studio Demo</title>
  <!-- Tailwind CDN for demo (production 建議用 build tool) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
  <nav class="bg-white shadow">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{{ url_for('main.index') }}" class="text-xl font-semibold">I2I Studio DEMO</a>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto p-4">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="mt-4">
          {% for msg in messages %}
            <div class="bg-yellow-100 text-yellow-800 p-3 rounded mb-2">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
